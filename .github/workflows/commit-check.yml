name: Commit Message Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate commit messages
        run: |
          commits=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%s")

          while IFS= read -r commit; do
            echo "Verificando: $commit"

            if [[ ! "$commit" =~ ^(add|update|fix):\ .+ ]]; then
              echo "❌ Commit inválido: $commit"
              echo "Os commits devem começar com add:, update: ou fix:"
              exit 1
            fi
          done <<< "$commits"

          echo "✅ Todos os commits estão válidos."